<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clawd Pet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* Body and everything outside the sprite is pointer-events: none → passes through */
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: rgba(0, 0, 0, 0);
      background: var(--debug-window-bg, transparent);
      user-select: none;
      -webkit-user-select: none;
      pointer-events: none;
    }
    /* Visual debug (see docs/adr/0005-dev-tools.md D9): the dev panel
       sets --debug-*-bg CSS vars on :root via the
       `devtools-pet-debug-style` Tauri event. Defaults are
       transparent. Hit-zone bg is most useful in practice (sprite bg
       is usually hidden behind the opaque pixel art). */
    #pet-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #hit-zone {
      position: absolute;
      pointer-events: auto;
      cursor: grab;
      touch-action: none;
      background: var(--debug-hitzone-bg, transparent);
      /* Position + size set by JS via theme-manager.computeScreenHitRect() */
      left: 0;
      top: 0;
      width: 0;
      height: 0;
    }
    #hit-zone:active { cursor: grabbing; }
    #pet-sprite {
      display: block;
      width: 144px;
      height: 144px;
      image-rendering: pixelated;
      pointer-events: none;
      background: var(--debug-sprite-bg, transparent);
    }
    #status {
      position: absolute;
      top: 4px;
      left: 4px;
      color: white;
      font: 9px monospace;
      background: rgba(0,0,0,0.5);
      padding: 2px 4px;
      border-radius: 2px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="status">idle</div>
  <div id="hit-zone"></div>
  <div id="pet-container">
    <img id="pet-sprite" src="" alt="pet" />
  </div>
  <script type="module">
    import { getCurrentWindow, currentMonitor } from '@tauri-apps/api/window';
    import { LogicalSize, LogicalPosition } from '@tauri-apps/api/dpi';
    import { emit as tauriEmit } from '@tauri-apps/api/event';
    import { StateMachine } from './src/pet/state-machine.js';
    import { ThemeManager } from './src/pet/theme-manager.js';

    const sprite = document.getElementById('pet-sprite');
    const hitZone = document.getElementById('hit-zone');
    const statusEl = document.getElementById('status');
    const currentWindow = getCurrentWindow();

    // ── Snapshot serialization ────────────────────────────────────
    //
    // `stateMachine.getSnapshot()` returns Maps (`Map<aid, Map<sid,
    // Entry>>`). Tauri 2's binary IPC claims to support Map, but
    // nested Maps have been observed to round-trip as empty `{}` in
    // some cases. Convert to plain objects for transport; the dev
    // panel rebuilds Maps on receipt.
    function serializeSnapshot(snap) {
      const sessions = {};
      for (const [aid, bySession] of snap.sessions) {
        sessions[aid] = {};
        for (const [sid, entry] of bySession) {
          sessions[aid][sid] = entry;
        }
      }
      const activeSubagents = {};
      for (const [aid, bySession] of snap.activeSubagents) {
        activeSubagents[aid] = {};
        for (const [sid, count] of bySession) {
          activeSubagents[aid][sid] = count;
        }
      }
      return {
        sessions,
        activeSubagents,
        activeOneShot: snap.activeOneShot,
        displayState: snap.displayState,
      };
    }

    // Theme manager
    const themeManager = new ThemeManager();

    themeManager.registerTheme('clawd', {
      name: 'Clawd',
      // viewBox / hitBox / fileHitBox / wide + sleeping file lists copied
      // verbatim from uma-pet's themes/clawd/theme.json (assets are
      // byte-identical, md5 verified). Keys translated w→width, h→height.
      // See ADR-0004.
      viewBox: { x: -15, y: -25, width: 45, height: 45 },
      fileViewBoxes: {},
      hitBoxes: {
        default: { x: -1, y: 5, width: 17, height: 12 },
        sleeping: { x: -2, y: 9, width: 19, height: 7 },
        wide: { x: -3, y: 3, width: 21, height: 14 },
      },
      fileHitBoxes: {
        'clawd-working-typing.svg': { x: -2, y: -7, width: 20, height: 24 },
      },
      wideHitboxFiles: ['clawd-error.svg', 'clawd-notification.svg'],
      sleepingHitboxFiles: ['clawd-sleeping.svg', 'clawd-collapse-sleep.svg'],
      states: {
        idle: { file: 'clawd-idle-follow.svg', type: 'svg' },
        thinking: { file: 'clawd-working-thinking.svg', type: 'svg' },
        working: { file: 'clawd-working-typing.svg', type: 'svg' },
        building: { file: 'clawd-working-building.svg', type: 'svg' },
        attention: { file: 'clawd-happy.svg', type: 'svg' },
        error: { file: 'clawd-error.svg', type: 'svg' },
        notification: { file: 'clawd-notification.svg', type: 'svg' },
        sleeping: { file: 'clawd-sleeping.svg', type: 'svg' },
        waking: { file: 'clawd-wake.svg', type: 'svg' },
        sweeping: { file: 'clawd-working-sweeping.svg', type: 'svg' },
        carrying: { file: 'clawd-working-carrying.svg', type: 'svg' },
        'subagent-groove': { file: 'clawd-headphones-groove.svg', type: 'svg' },
        juggling: { file: 'clawd-working-juggling.svg', type: 'svg' },
      },
    });
    themeManager.registerTheme('calico', {
      name: 'Calico',
      // viewBox / hitBox / wide + sleeping file lists copied verbatim from
      // uma-pet's themes/calico/theme.json (assets byte-identical, md5
      // verified). Keys translated w→width, h→height. See ADR-0004.
      viewBox: { x: 0, y: 0, width: 266, height: 200 },
      fileViewBoxes: {},
      hitBoxes: {
        default: { x: 80, y: 30, width: 106, height: 140 },
        sleeping: { x: 60, y: 60, width: 146, height: 100 },
        wide: { x: 50, y: 20, width: 166, height: 160 },
      },
      fileHitBoxes: {},
      wideHitboxFiles: [
        'calico-error.apng',
        'calico-notification.apng',
        'calico-working-conducting.apng',
      ],
      sleepingHitboxFiles: ['calico-sleeping.apng', 'calico-collapsing.apng'],
      states: {
        idle: { file: 'calico-idle.apng', type: 'apng' },
        thinking: { file: 'calico-thinking.apng', type: 'apng' },
        working: { file: 'calico-working-typing.apng', type: 'apng' },
        building: { file: 'calico-working-building.apng', type: 'apng' },
        attention: { file: 'calico-happy.apng', type: 'apng' },
        error: { file: 'calico-error.apng', type: 'apng' },
        notification: { file: 'calico-notification.apng', type: 'apng' },
        sleeping: { file: 'calico-sleeping.apng', type: 'apng' },
        waking: { file: 'calico-waking.apng', type: 'apng' },
        sweeping: { file: 'calico-working-sweeping.apng', type: 'apng' },
        carrying: { file: 'calico-working-carrying.apng', type: 'apng' },
        'subagent-groove': { file: 'calico-conducting.apng', type: 'apng' },
        juggling: { file: 'calico-working-juggling.apng', type: 'apng' },
      },
    });

    themeManager.setTheme('clawd');

    // State machine
    const stateMachine = new StateMachine();
    let currentDisplayState = 'idle';

    function refreshSprite() {
      const url = themeManager.getAssetUrl(currentDisplayState);
      if (url) sprite.src = url;
    }

    // Map current state's viewBox hit-box through the sprite's actual rendered
    // rect and write the result onto #hit-zone. Fires on state change, theme
    // change, and tauri://move (so mini-mode / peek resize the hit area).
    // See ADR-0004.
    function updateHitZone() {
      const renderedRect = sprite.getBoundingClientRect();
      const hitRect = themeManager.computeScreenHitRect(currentDisplayState, renderedRect);
      if (!hitRect) {
        hitZone.style.display = 'none';
        return;
      }
      hitZone.style.display = 'block';
      hitZone.style.left = `${hitRect.x}px`;
      hitZone.style.top = `${hitRect.y}px`;
      hitZone.style.width = `${hitRect.width}px`;
      hitZone.style.height = `${hitRect.height}px`;
    }

    function setDisplayState(state) {
      if (state === currentDisplayState) return;
      const prevState = currentDisplayState;
      currentDisplayState = state;
      refreshSprite();
      updateHitZone();
      statusEl.textContent = state;
      statusEl.style.color = state === 'error' ? '#ff6b6b' : 'white';

      // Sound effects — 10s cooldown, only when entering attention (Stop/completion)
      if (state === 'attention' && prevState !== 'attention') {
        playSound('complete');
      }
    }

    // Sound playback with cooldown
    let lastSoundTime = 0;
    const SOUND_COOLDOWN_MS = 10000;
    const audioCache = new Map();

    function playSound(name) {
      if (!settings.sound_enabled) return;
      const now = Date.now();
      if (now - lastSoundTime < SOUND_COOLDOWN_MS) return;
      lastSoundTime = now;

      let audio = audioCache.get(name);
      if (!audio) {
        audio = new Audio(`/sounds/${name}.mp3`);
        audio.volume = 0.5;
        audioCache.set(name, audio);
      }
      audio.currentTime = 0;
      audio.play().catch((err) => {
        console.warn(`[pet] sound play failed: ${err}`);
      });
    }

    // Settings (sound toggle) - listen for changes
    const settings = { sound_enabled: true };
    if (window.__TAURI__?.event?.listen) {
      window.__TAURI__.event.listen('pet-dnd-change', (e) => {
        const dnd = e.payload?.dnd;
        if (dnd) {
          // Pause any ongoing sounds when DND is on
          audioCache.forEach((a) => a.pause());
        }
      });
    }

    stateMachine.onChange(({ display }) => {
      setDisplayState(display);
      // Broadcast the full snapshot to any listening webview (the
      // dev panel uses this instead of maintaining its own state
      // machine — see docs/adr/0005-dev-tools.md D9/D10). The pet
      // is the single source of truth; everyone else is observational.
      const snap = stateMachine.getSnapshot();
      console.log('[pet] onChange → emit pet-state-changed', { display, sessions: snap.sessions.size, activeSubagents: snap.activeSubagents.size });
      tauriEmit('pet-state-changed', serializeSnapshot(snap)).catch((err) =>
        console.warn('[pet] pet-state-changed emit failed:', err)
      );
    });
    themeManager.onChange(() => {
      refreshSprite();
      updateHitZone();
    });

    // Initial paint: the state machine doesn't emit anything in its
    // constructor, so setDisplayState('idle') would early-return against
    // currentDisplayState's initial 'idle' value. Without this, the hit-zone
    // stays at its 0×0 default until the first agent-hook-event arrives —
    // a regression from the old fixed 144×144 div which was always live.
    refreshSprite();
    updateHitZone();

    if (window.__TAURI__?.event?.listen) {
      window.__TAURI__.event.listen('agent-hook-event', (e) => {
        const payload = e.payload;
        stateMachine.processEvent({
          session_id: payload.session_id,
          event_type: payload.event_type,
          tool_name: payload.tool_name,
          agent: payload.agent,
          success: payload.success,
        });
        // ADR-0003 cleanup: when a session ends, drop its
        // always-allow set so a future session opened by the same
        // agent starts from a clean slate. The HTTP server holds
        // the in-memory map; we tell it to forget this (agent,
        // session) key.
        if (payload.event_type === 'SessionEnd' && payload.session_id) {
          window.__TAURI__.core
            .invoke('clear_always_allow_session', {
              agentId: payload.agent || 'unknown',
              sessionId: payload.session_id,
            })
            .catch((err) => console.warn('[pet] clear_always_allow_session failed:', err));
        }
      });
      // Dev-tools synthetic events (see docs/adr/0005-dev-tools.md
      // D6). Same wire shape as agent-hook-event but wrapped in an
      // envelope `{ event, synthetic, source }`. The state machine
      // sees a clean canonical HookEvent — it never inspects the
      // `synthetic` flag. The synthetic path mirrors the real path's
      // SessionEnd → clear_always_allow_session chain so debugging
      // session-boundary cleanup is honest.
      window.__TAURI__.event.listen('devtools-synthetic-event', (e) => {
        const ev = e.payload?.event;
        if (!ev) return;
        stateMachine.processEvent({
          session_id: ev.session_id,
          event_type: ev.event_type,
          tool_name: ev.tool_name,
          agent: ev.agent,
          success: ev.success,
        });
        if (ev.event_type === 'SessionEnd' && ev.session_id) {
          window.__TAURI__.core
            .invoke('clear_always_allow_session', {
              agentId: ev.agent || 'unknown',
              sessionId: ev.session_id,
            })
            .catch((err) =>
              console.warn('[pet] clear_always_allow_session (synthetic) failed:', err)
            );
        }
      });
      // Dev-tools Reset (ADR-0005 D7). Wipes this StateMachine's
      // session/subagent state and cancels any in-flight one-shot.
      window.__TAURI__.event.listen('devtools-reset', () => {
        stateMachine.reset();
      });
      // Visual debug (ADR-0005 D9): the dev panel broadcasts the
      // current windowBg / spriteBg / hitzoneBg colors via this
      // channel. We apply them as CSS vars on :root so the existing
      // rules above pick them up. Pure JS event — no Rust
      // involvement.
      window.__TAURI__.event.listen('devtools-pet-debug-style', (e) => {
        const p = e.payload || {};
        const root = document.documentElement.style;
        root.setProperty('--debug-window-bg', p.windowBg || 'transparent');
        root.setProperty('--debug-sprite-bg', p.spriteBg || 'transparent');
        root.setProperty('--debug-hitzone-bg', p.hitzoneBg || 'transparent');
      });
      // Dev panel pulls initial state on mount. Pet is the source of
      // truth; the dev panel never builds its own StateMachine. This
      // is a one-shot request/response on the same channel as the
      // ongoing `pet-state-changed` pushes (see onChange above).
      window.__TAURI__.event.listen('devtools-pet-state-request', () => {
        tauriEmit('pet-state-changed', serializeSnapshot(stateMachine.getSnapshot())).catch((err) =>
          console.warn('[pet] pet-state-changed (request) emit failed:', err)
        );
      });
      window.__TAURI__.event.listen('pet-theme-change', (e) => {
        const themeId = e.payload?.theme;
        if (themeId) themeManager.setTheme(themeId);
      });
    }

    // Drag on hit-zone only (the asset-specific rectangle, updated by JS).
    hitZone.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return;
      e.preventDefault();
      hitZone.setPointerCapture(e.pointerId);
      currentWindow.startDragging().catch((err) => {
        console.error('[pet] startDragging failed:', err);
      });
    });

    // ── Mini mode: edge-snap + peek-on-hover ──
    const FULL_SIZE = { width: 200, height: 200 };
    const MINI_SIZE = { width: 160, height: 160 }; // Must fit 144x144 pet sprite
    const EDGE_THRESHOLD = 30; // logical px from screen edge to trigger mini mode
    let isMiniMode = false;
    let isPeeking = false;
    let preMiniPosition = null; // logical pixels

    // Get scale factor from monitor (physical → logical conversion)
    async function getScaleFactor() {
      try {
        const monitor = await currentMonitor();
        if (monitor && monitor.scaleFactor) return monitor.scaleFactor;
      } catch (err) {
        console.warn('[pet] getScaleFactor failed:', err);
      }
      return window.devicePixelRatio || 1;
    }

    // Returns screen size in LOGICAL pixels
    async function getScreenSize() {
      try {
        const monitor = await currentMonitor();
        if (monitor) {
          const scale = monitor.scaleFactor || 1;
          return {
            width: Math.round(monitor.size.width / scale),
            height: Math.round(monitor.size.height / scale),
          };
        }
      } catch (err) {
        console.warn('[pet] currentMonitor failed:', err);
      }
      return { width: window.screen.width, height: window.screen.height };
    }

    // Returns window position in LOGICAL pixels
    async function getLogicalWindowPos() {
      const pos = await currentWindow.outerPosition(); // physical pixels
      const scale = await getScaleFactor();
      return { x: Math.round(pos.x / scale), y: Math.round(pos.y / scale) };
    }

    async function enterMiniMode() {
      if (isMiniMode) return;
      isMiniMode = true;
      console.log('[pet] entering mini mode');

      try {
        const pos = await getLogicalWindowPos();
        // Only save preMiniPosition on the first entry
        if (preMiniPosition === null) {
          preMiniPosition = { x: pos.x, y: pos.y };
          console.log('[pet] pre-mini pos (logical):', preMiniPosition);
        }
      } catch (err) {
        console.warn('[pet] failed to get position:', err);
      }

      try {
        const screenSize = await getScreenSize();
        console.log('[pet] screen size (logical):', screenSize);
        if (!screenSize) return;

        const newX = screenSize.width - MINI_SIZE.width;
        const newY = preMiniPosition?.y ?? 100;
        console.log(`[pet] snap target: (${newX}, ${newY}) size ${MINI_SIZE.width}x${MINI_SIZE.height}`);

        await currentWindow.setSize(new LogicalSize(MINI_SIZE.width, MINI_SIZE.height));
        await currentWindow.setPosition(new LogicalPosition(newX, newY));

        const verify = await getLogicalWindowPos();
        console.log('[pet] actual position (logical):', verify);
      } catch (err) {
        console.warn('[pet] resize failed:', err);
        isMiniMode = false;
      }
    }

    async function exitMiniMode() {
      if (!isMiniMode) return;
      isMiniMode = false;
      isPeeking = false;
      console.log('[pet] exiting mini mode');

      try {
        await currentWindow.setSize(new LogicalSize(FULL_SIZE.width, FULL_SIZE.height));
        if (preMiniPosition) {
          await currentWindow.setPosition(new LogicalPosition(preMiniPosition.x, preMiniPosition.y));
        }
      } catch (err) {
        console.warn('[pet] resize failed:', err);
      }
    }

    async function checkEdgeSnap() {
      try {
        const pos = await getLogicalWindowPos();
        const screenSize = await getScreenSize();
        if (!screenSize) return;
        const distToRight = screenSize.width - (pos.x + FULL_SIZE.width);
        console.log(`[pet] edge check: distToRight=${distToRight} pos=(${pos.x},${pos.y}) screen=${screenSize.width}x${screenSize.height}`);
        if (distToRight < EDGE_THRESHOLD && !isMiniMode) {
          await enterMiniMode();
        }
      } catch (err) {
        console.warn('[pet] edge check failed:', err);
      }
    }

    // Listen for drag end → check edge snap + recompute hit-zone
    if (window.__TAURI__?.event?.listen) {
      window.__TAURI__.event.listen('tauri://move', () => {
        if (!isMiniMode) checkEdgeSnap();
        updateHitZone();
      });
    }

    // Peek-on-hover: track mouse position relative to right edge of screen
    // Use screenX (screen-relative) not clientX (window-relative)
    document.addEventListener('mousemove', async (e) => {
      if (!isMiniMode) return;
      const screenW = window.screen.width;
      const distToRight = screenW - e.screenX;
      const shouldPeek = distToRight < 20;
      if (shouldPeek !== isPeeking) {
        isPeeking = shouldPeek;
        console.log(`[pet] peek=${shouldPeek} screenX=${e.screenX} distToRight=${distToRight}`);
        const size = shouldPeek ? FULL_SIZE : MINI_SIZE;
        const screenSize = await getScreenSize();
        const newX = screenSize.width - size.width;
        const newY = preMiniPosition?.y ?? 100;
        try {
          await currentWindow.setSize(new LogicalSize(size.width, size.height));
          await currentWindow.setPosition(new LogicalPosition(newX, newY));
        } catch (err) {
          console.warn('[pet] peek resize failed:', err);
        }
      }
    });

    refreshSprite();
  </script>
</body>
</html>
